<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>贪吃蛇</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .game { text-align: center; }
    h1 { margin: 0 0 12px; }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 18px;
    }
    canvas {
      background: #0f172a;
      border: 3px solid #38bdf8;
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .35);
    }
    button {
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      background: #22c55e;
      color: white;
      font-weight: 700;
    }
    .hint { color: #cbd5e1; margin-top: 10px; }
  </style>
</head>
<body>
  <main class="game">
    <h1>贪吃蛇</h1>
    <div class="hud">
      <span>分数：<strong id="score">0</strong></span>
      <button id="restart">重新开始</button>
    </div>
    <canvas id="board" width="400" height="400" aria-label="贪吃蛇游戏区域"></canvas>
    <p class="hint">使用方向键或 WASD 控制；撞墙或撞到自己会结束游戏。</p>
  </main>
  <script src="game.js"></script>
</body>
</html>
